name: on-pr

on:
  pull_request:
    branches:
      - main
    types:
      - labeled
      - opened
      - reopened
      - synchronize
    paths:
      - '.github/workflows/on-pr.yaml'
      - '.gitops/**'
      - 'apis/**'
      - 'examples/**'
      - 'tests/**'
      - 'functions/**'
      - 'upbound.yaml'

permissions:
  id-token: write
  packages: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  validate:
    uses: unbounded-tech/workflows-crossplane/.github/workflows/validate.yaml@v2.19.1
    with:
      examples: |
        [
          { "example": "examples/networks/minimal.yaml" },
          { "example": "examples/networks/standard.yaml" },
          { "example": "examples/networks/dual-stack-ula.yaml" },
          { "example": "examples/networks/dual-stack-amazon.yaml" },
          { "example": "examples/networks/high-availability.yaml" },
          { "example": "examples/networks/import-example.yaml" },
          { "example": "examples/networks/with-ipam.yaml", "observed_resources": "examples/test/mocks/observed-resources/with-ipam/steps/1" },
          { "example": "examples/networks/with-ipam.yaml", "observed_resources": "examples/test/mocks/observed-resources/with-ipam/steps/2" },
          { "example": "examples/networks/with-ipam.yaml", "observed_resources": "examples/test/mocks/observed-resources/with-ipam/steps/3" },
          { "example": "examples/networks/with-ipam.yaml", "observed_resources": "examples/test/mocks/observed-resources/with-ipam/steps/4" }
        ]
      api_path: apis/networks
      error_on_missing_schemas: true

  test:
    uses: unbounded-tech/workflows-crossplane/.github/workflows/test.yaml@v2.19.1

  e2e:
    uses: unbounded-tech/workflows-crossplane/.github/workflows/e2e.yaml@v2.19.1
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    with:
      aws: true
      aws-use-oidc: true
      aws-account-id: "034489662075"
      aws-region: us-east-2
      timeout-minutes: 30
      cleanup-timeout-minutes: 30
      write-env-files: true
      env-vars: |
        {
          "IPAM_POOL_REGIONAL_IPV4": "${{ vars.IPAM_POOL_REGIONAL_IPV4 }}",
          "IPAM_POOL_REGIONAL_IPV6": "${{ vars.IPAM_POOL_REGIONAL_IPV6 }}",
          "NETWORK_VPC": "${{ vars.NETWORK_VPC }}",
          "NETWORK_IGW": "${{ vars.NETWORK_IGW }}",
          "NETWORK_EIGW": "${{ vars.NETWORK_EIGW }}",
          "NETWORK_SUBNET_PRIVATE_A": "${{ vars.NETWORK_SUBNET_PRIVATE_A }}",
          "NETWORK_SUBNET_PRIVATE_B": "${{ vars.NETWORK_SUBNET_PRIVATE_B }}",
          "NETWORK_SUBNET_PRIVATE_C": "${{ vars.NETWORK_SUBNET_PRIVATE_C }}",
          "NETWORK_SUBNET_PUBLIC_A": "${{ vars.NETWORK_SUBNET_PUBLIC_A }}",
          "NETWORK_SUBNET_PUBLIC_B": "${{ vars.NETWORK_SUBNET_PUBLIC_B }}",
          "NETWORK_SUBNET_PUBLIC_C": "${{ vars.NETWORK_SUBNET_PUBLIC_C }}",
          "NETWORK_RT_PUBLIC": "${{ vars.NETWORK_RT_PUBLIC }}",
          "NETWORK_RT_PRIVATE_A": "${{ vars.NETWORK_RT_PRIVATE_A }}",
          "NETWORK_RT_PRIVATE_B": "${{ vars.NETWORK_RT_PRIVATE_B }}",
          "NETWORK_RT_PRIVATE_C": "${{ vars.NETWORK_RT_PRIVATE_C }}",
          "NETWORK_RTA_PUBLIC_A": "${{ vars.NETWORK_RTA_PUBLIC_A }}",
          "NETWORK_RTA_PUBLIC_B": "${{ vars.NETWORK_RTA_PUBLIC_B }}",
          "NETWORK_RTA_PUBLIC_C": "${{ vars.NETWORK_RTA_PUBLIC_C }}",
          "NETWORK_RTA_PRIVATE_A": "${{ vars.NETWORK_RTA_PRIVATE_A }}",
          "NETWORK_RTA_PRIVATE_B": "${{ vars.NETWORK_RTA_PRIVATE_B }}",
          "NETWORK_RTA_PRIVATE_C": "${{ vars.NETWORK_RTA_PRIVATE_C }}",
          "NAT_GATEWAY_A": "${{ vars.NAT_GATEWAY_A }}",
          "EIP_ALLOCATION_A": "${{ vars.EIP_ALLOCATION_A }}"
        }

  publish:
    needs:
      - validate
      - test
    uses: unbounded-tech/workflows-crossplane/.github/workflows/publish.yaml@v2.19.1
    secrets: inherit
    with:
      tag: pr-${{ github.event.pull_request.number }}-${{ github.sha }}
